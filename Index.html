<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel Expense Tracker</title>
    <style>
        :root {
            --primary: #4f46e5;
            --danger: #dc2626;
            --success: #16a34a;
            --bg: #f3f4f6; /* Light Gray Background */
            --card: #ffffff;
            --text-main: #1f2937;
            --text-muted: #6b7280;
        }

        body { 
            font-family: 'Inter', system-ui, sans-serif; 
            margin: 0; 
            background: var(--bg); 
            color: var(--text-main);
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .container { 
            width: 100%;
            max-width: 400px; 
            background: var(--card); 
            padding: 24px; 
            border-radius: 16px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            border: 1px solid #e5e7eb;
        }

        .total-bar { 
            font-size: 2rem; 
            font-weight: 800; 
            padding: 20px; 
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            color: white; 
            border-radius: 12px; 
            margin-bottom: 24px; 
            text-align: center;
        }

        .input-group { margin-bottom: 12px; }

        input { 
            width: 100%; 
            padding: 12px; 
            background: #fff;
            border: 1px solid #d1d5db;
            border-radius: 8px; 
            color: var(--text-main);
            font-size: 1rem; 
            box-sizing: border-box;
            outline: none;
        }

        input:focus { border-color: var(--primary); ring: 2px solid var(--primary); }

        .add-btn { 
            width: 100%;
            padding: 14px;
            background: var(--success);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
            margin-bottom: 20px;
            transition: opacity 0.2s;
        }

        .add-btn:active { opacity: 0.8; }

        .expense-list { 
            max-height: 400px;
            overflow-y: auto;
        }

        .entry { 
            background: #f9fafb;
            margin-bottom: 10px;
            padding: 12px; 
            border-radius: 10px;
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            border: 1px solid #f3f4f6;
        }

        .entry-amount { font-weight: bold; color: var(--text-main); font-size: 1.1rem; }
        .entry-reason { font-size: 0.95rem; color: var(--text-muted); }
        .entry-date { font-size: 0.75rem; color: #9ca3af; margin-top: 4px; }

        .delete-btn { 
            background: #fee2e2; 
            color: var(--danger); 
            border: none;
            cursor: pointer; 
            padding: 8px 12px; 
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .clear-btn { 
            width: 100%;
            background: none; 
            color: var(--text-muted); 
            border: 1px solid #d1d5db; 
            padding: 10px;
            margin-top: 15px; 
            cursor: pointer;
            border-radius: 8px;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="total-bar" id="total-amount">₹0</div>

    <div class="input-group">
        <input type="number" id="amount" placeholder="Amount (₹)">
    </div>
    <div class="input-group">
        <input type="text" id="reason" placeholder="What did you spend on?">
    </div>
    
    <button class="add-btn" onclick="addExpense()">Add Expense</button>

    <div class="expense-list" id="expense-list"></div>

    <button class="clear-btn" onclick="clearAll()">Clear All History</button>
</div>

<script>
    let expenses = JSON.parse(localStorage.getItem('expenses')) || [];

    const inrFormatter = new Intl.NumberFormat('en-IN', {
        style: 'currency',
        currency: 'INR',
        maximumFractionDigits: 0
    });

    function render() {
        const list = document.getElementById('expense-list');
        const totalDisplay = document.getElementById('total-amount');
        list.innerHTML = '';
        let total = 0;

        [...expenses].reverse().forEach((item, index) => {
            const originalIndex = expenses.length - 1 - index;
            total += parseFloat(item.amount);
            list.innerHTML += `
                <div class="entry">
                    <div>
                        <div class="entry-amount">${inrFormatter.format(item.amount)}</div>
                        <div class="entry-reason">${item.reason}</div>
                        <div class="entry-date">${item.date}</div>
                    </div>
                    <button class="delete-btn" onclick="deleteExpense(${originalIndex})">Delete</button>
                </div>`;
        });

        totalDisplay.innerText = inrFormatter.format(total);
        localStorage.setItem('expenses', JSON.stringify(expenses));
    }

    function addExpense() {
        const amt = document.getElementById('amount');
        const res = document.getElementById('reason');
        
        if (!amt.value || !res.value) return;

        const date = new Date().toLocaleString('en-IN', { 
            day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit' 
        });

        expenses.push({ amount: amt.value, reason: res.value, date: date });
        
        amt.value = '';
        res.value = '';
        render();
    }

    function deleteExpense(index) {
        expenses.splice(index, 1);
        render();
    }

    function clearAll() {
        if (confirm("Delete everything?")) {
            expenses = [];
            render();
        }
    }

    render();
</script>

</body>

</html>
